<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inscription - GreenOrder</title>

<style>
:root{
  --green:#16c172;
  --text:#0b0f14;
  --muted:#5b6472;
  --border:rgba(0,0,0,0.08);
}

*{
  box-sizing:border-box;
  scroll-behavior:smooth;
}

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(135deg,#f7faf8,#ffffff);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  color:var(--text);
  overflow:hidden;
}

/* CARD */
.container{
  width:440px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:22px;
  padding:30px;
  box-shadow:0 30px 80px rgba(0,0,0,0.08);
  animation:fadeUp 0.6s ease;
}

/* LOGO */
.logo{
  font-size:22px;
  font-weight:800;
  text-align:center;
  margin-bottom:10px;
}

.logo span{color:var(--green);}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:20px;
  font-weight:600;
}

/* GRID */
.form-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* INPUTS */
input{
  width:100%;
  padding:12px;
  margin:6px 0;
  border-radius:12px;
  border:1px solid var(--border);
  outline:none;
  transition:0.3s;
  font-size:14px;
}

input:focus{
  border-color:var(--green);
  box-shadow:0 0 0 3px rgba(22,193,114,0.15);
}

.full{
  grid-column:span 2;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  margin-top:15px;
  border-radius:14px;
  border:none;
  background:var(--green);
  color:white;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  transform:translateY(-2px);
  box-shadow:0 10px 30px rgba(22,193,114,0.3);
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

/* TEXT */
p{
  text-align:center;
  margin-top:15px;
  font-size:13px;
  color:var(--muted);
}

a{
  color:var(--green);
  text-decoration:none;
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0; transform:translateY(20px);}
  to{opacity:1; transform:translateY(0);}
}

/* 🍏 APPLE STYLE TOAST NOTIFICATION */
.toast{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(20,20,20,0.92);
  color:white;
  padding:12px 18px;
  border-radius:14px;
  font-size:14px;
  opacity:0;
  pointer-events:none;
  transition:0.4s ease;
  backdrop-filter:blur(10px);
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(10px);
}
</style>
</head>

<body>

<div class="container">

  <div class="logo">
    <span>Green</span>Order
  </div>

  <h2>Créer votre restaurant</h2>

  <div class="form-grid">

    <input type="text" id="restaurant" placeholder="Nom du restaurant">
    <input type="text" id="manager" placeholder="Nom du gérant">

    <input type="text" id="phone" placeholder="Téléphone">
    <input type="email" id="email" placeholder="Email (optionnel)">

    <input type="text" id="city" placeholder="Ville">
    <input type="number" id="tables" placeholder="Nombre de tables">

    <input type="password" id="password" class="full" placeholder="Mot de passe">

  </div>

  <button id="btn" onclick="register()">Créer mon compte</button>

  <p>
    Déjà inscrit ? <a href="/login">Se connecter</a>
  </p>

</div>

<!-- 🍏 TOAST -->
<div id="toast" class="toast"></div>

<script>

function showToast(msg){
  const toast=document.getElementById("toast");
  toast.innerText=msg;
  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },2500);
}

function register(){

  const btn=document.getElementById("btn");
  btn.disabled=true;
  btn.innerText="Création...";

  const data={
    restaurant:document.getElementById("restaurant").value,
    manager:document.getElementById("manager").value,
    phone:document.getElementById("phone").value,
    email:document.getElementById("email").value,
    city:document.getElementById("city").value,
    tables:document.getElementById("tables").value,
    password:document.getElementById("password").value
  };

  // VALIDATION MINIMALE
  if(!data.restaurant || !data.manager || !data.phone || !data.city || !data.tables || !data.password){
    showToast("Veuillez remplir tous les champs obligatoires");
    btn.disabled=false;
    btn.innerText="Créer mon compte";
    return;
  }

  fetch("/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
  })
  .then(res=>res.json())
  .then(data=>{

    showToast(data.message);

    if(data.message==="Restaurant créé"){
      setTimeout(()=>{
        window.location.href="/admin";
      },1200);
    }

    btn.disabled=false;
    btn.innerText="Créer mon compte";
  })
  .catch(()=>{
    showToast("Erreur serveur");
    btn.disabled=false;
    btn.innerText="Créer mon compte";
  });
}

</script>

</body>
</html>
